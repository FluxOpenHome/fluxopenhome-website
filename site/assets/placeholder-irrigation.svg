<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f8f9fa"/>
  <!-- Controller body -->
  <rect x="80" y="50" width="240" height="170" rx="12" fill="#1a1a2e" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Top panel -->
  <rect x="95" y="60" width="210" height="30" rx="6" fill="#16213e"/>
  <!-- Status LED -->
  <circle cx="115" cy="75" r="5" fill="#0f9b58"/>
  <text x="130" y="79" font-family="monospace" font-size="11" fill="#0f9b58">FLUX IRRIGATION</text>
  <!-- Zone outputs (8 ports) -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="22" height="28" rx="3" fill="#0f9b58" opacity="0.9"/>
    <text x="11" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">1</text>
    <rect x="28" y="0" width="22" height="28" rx="3" fill="#0f9b58" opacity="0.8"/>
    <text x="39" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">2</text>
    <rect x="56" y="0" width="22" height="28" rx="3" fill="#0f9b58" opacity="0.85"/>
    <text x="67" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">3</text>
    <rect x="84" y="0" width="22" height="28" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="95" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">4</text>
    <rect x="112" y="0" width="22" height="28" rx="3" fill="#4a90d9" opacity="0.85"/>
    <text x="123" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">5</text>
    <rect x="140" y="0" width="22" height="28" rx="3" fill="#4a90d9" opacity="0.8"/>
    <text x="151" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">6</text>
    <rect x="168" y="0" width="22" height="28" rx="3" fill="#4a90d9" opacity="0.9"/>
    <text x="179" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">7</text>
    <rect x="196" y="0" width="22" height="28" rx="3" fill="#f0ad4e" opacity="0.85"/>
    <text x="207" y="18" text-anchor="middle" font-family="monospace" font-size="9" fill="white" font-weight="600">8</text>
  </g>
  <!-- WiFi antenna icon -->
  <g transform="translate(280, 155)">
    <path d="M10 20 L10 8" stroke="#0f9b58" stroke-width="2" stroke-linecap="round"/>
    <path d="M2 12 Q10 2 18 12" stroke="#0f9b58" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M5 14 Q10 7 15 14" stroke="#0f9b58" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <!-- ESP32-S3 label -->
  <text x="200" y="200" text-anchor="middle" font-family="monospace" font-size="10" fill="#666">ESP32-S3 | 8-32 Zones</text>
  <!-- Label -->
  <text x="200" y="260" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#666">Flux Irrigation Controller</text>
</svg>
