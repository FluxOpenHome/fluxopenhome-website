<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#f8f9fa"/>
  <!-- Glow effect -->
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#0f9b58" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f9b58" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="80" y="30" width="240" height="240" rx="16" fill="url(#glow)"/>
  <!-- 4x4 LED Grid -->
  <g transform="translate(140, 80)">
    <!-- Row 1 -->
    <circle cx="20" cy="20" r="14" fill="#0f9b58" opacity="0.9"/>
    <circle cx="60" cy="20" r="14" fill="#4a90d9" opacity="0.8"/>
    <circle cx="100" cy="20" r="14" fill="#f0ad4e" opacity="0.85"/>
    <circle cx="140" cy="20" r="14" fill="#dc3545" opacity="0.75"/>
    <!-- Row 2 -->
    <circle cx="20" cy="60" r="14" fill="#4a90d9" opacity="0.85"/>
    <circle cx="60" cy="60" r="14" fill="#0f9b58" opacity="0.75"/>
    <circle cx="100" cy="60" r="14" fill="#dc3545" opacity="0.9"/>
    <circle cx="140" cy="60" r="14" fill="#f0ad4e" opacity="0.8"/>
    <!-- Row 3 -->
    <circle cx="20" cy="100" r="14" fill="#f0ad4e" opacity="0.8"/>
    <circle cx="60" cy="100" r="14" fill="#dc3545" opacity="0.85"/>
    <circle cx="100" cy="100" r="14" fill="#4a90d9" opacity="0.75"/>
    <circle cx="140" cy="100" r="14" fill="#0f9b58" opacity="0.9"/>
    <!-- Row 4 -->
    <circle cx="20" cy="140" r="14" fill="#dc3545" opacity="0.75"/>
    <circle cx="60" cy="140" r="14" fill="#f0ad4e" opacity="0.9"/>
    <circle cx="100" cy="140" r="14" fill="#0f9b58" opacity="0.8"/>
    <circle cx="140" cy="140" r="14" fill="#4a90d9" opacity="0.85"/>
  </g>
  <!-- Label -->
  <text x="200" y="275" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="#666">Flux Night Light - 16 LED Array</text>
</svg>
