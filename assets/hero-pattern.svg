<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600" fill="none">
  <defs>
    <pattern id="circuit" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <!-- Horizontal traces -->
      <line x1="0" y1="25" x2="40" y2="25" stroke="#0f9b58" stroke-width="0.5" opacity="0.15"/>
      <line x1="60" y1="75" x2="100" y2="75" stroke="#0f9b58" stroke-width="0.5" opacity="0.1"/>
      <!-- Vertical traces -->
      <line x1="25" y1="0" x2="25" y2="35" stroke="#4a90d9" stroke-width="0.5" opacity="0.1"/>
      <line x1="75" y1="65" x2="75" y2="100" stroke="#4a90d9" stroke-width="0.5" opacity="0.12"/>
      <!-- Nodes -->
      <circle cx="25" cy="25" r="2" fill="#0f9b58" opacity="0.2"/>
      <circle cx="75" cy="75" r="2" fill="#4a90d9" opacity="0.15"/>
      <circle cx="50" cy="50" r="1.5" fill="#0f9b58" opacity="0.1"/>
      <!-- Angled traces -->
      <line x1="40" y1="25" x2="50" y2="50" stroke="#0f9b58" stroke-width="0.5" opacity="0.08"/>
      <line x1="50" y1="50" x2="60" y2="75" stroke="#4a90d9" stroke-width="0.5" opacity="0.08"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#circuit)"/>
</svg>
